name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore recorder.csproj

      - name: Publish (self-contained win-x64)
        run: >
          dotnet publish recorder.csproj
          --self-contained
          -p:PublishSingleFile=true
          -p:TreatWarningsAsErrors=true
          -r win-x64
          -c Release
          -o publish_out

      - name: Prepare release notes & checksum
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $content = Get-Content CHANGELOG.md -Raw
          $escaped = [regex]::Escape($version)
          # Stop before the --- separator or the next ## section to avoid including the divider
          if ($content -match "(?s)## \[$escaped\][^\n]*\n(.*?)(?=\n---|\n## \[|\z)") {
            $notes = $Matches[1].Trim()
          } else {
            $notes = "Release ${{ github.ref_name }}"
          }
          $hash = (Get-FileHash publish_out\recorder.exe -Algorithm SHA256).Hash.ToLower()
          $notes += "`n`n## Checksums`n``sha256:$hash``"
          $notes | Out-File release_notes.txt -Encoding UTF8 -NoNewline

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish_out/recorder.exe
          body_path: release_notes.txt
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
