name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build, Lint & Security
    # Windows-only project — run CI on the same platform as the release build
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore recorder.csproj

      - name: Build (warnings as errors)
        run: dotnet build recorder.csproj --no-restore -c Release -p:TreatWarningsAsErrors=true

      - name: Format check
        # dotnet format is built into the .NET SDK (since .NET 6); no separate installation needed
        run: dotnet format recorder.csproj --verify-no-changes

      - name: Vulnerability scan
        # Parse JSON output for machine-readable results — avoids fragile text/locale matching
        run: |
          $json = dotnet list recorder.csproj package --vulnerable --include-transitive --format json | ConvertFrom-Json
          $vulnerable = @(
            $json.projects.frameworks | ForEach-Object {
              @($_.topLevelPackages) + @($_.transitivePackages)
            } | Where-Object { $_.vulnerabilities -and $_.vulnerabilities.Count -gt 0 }
          )
          if ($vulnerable.Count -gt 0) {
            $vulnerable | ForEach-Object { Write-Host "VULNERABLE: $($_.id) @ $($_.resolvedVersion)" }
            Write-Host "::error::Vulnerable NuGet packages detected"
            exit 1
          }
          Write-Host "No vulnerable packages found."

  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build for CodeQL
        run: dotnet build recorder.csproj -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
